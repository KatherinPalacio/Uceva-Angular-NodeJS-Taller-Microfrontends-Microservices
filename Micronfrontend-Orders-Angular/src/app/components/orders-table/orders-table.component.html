<table class="table table-striped table-bordered">
  <thead>
    <tr>
      <th>ID</th>
      <th>Cliente</th>
      <th>Producto</th>
      <th>Cantidad</th>
      <th>Total</th>
      <th>Estado</th>
    </tr>
  </thead>

  <tbody>
    @for (order of orders(); track order.id) {
      <tr>
        <td>{{ order.id }}</td>
        <td>{{ order.customerName }}</td>
        <td>{{ order.productName }}</td>
        <td>{{ order.quantity }}</td>
        <td>{{ order.total }}</td>
        <td>{{ order.status }}</td>
      </tr>
    }
  </tbody>
</table>
